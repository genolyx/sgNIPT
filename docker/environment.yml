name: single-gene-nipt
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # ── Core tools ─────────────────────────────────────────────────────────
  - python>=3.9
  
  # ── Preprocessing ──────────────────────────────────────────────────────
  - fastp>=0.23
  
  # ── Alignment ──────────────────────────────────────────────────────────
  - bwa>=0.7      # Use when BWA index (.bwt) exists; BWA-MEM2 needs .bwt.2bit.64
  - bwa-mem2>=2.2
  - samtools>=1.17
  - picard>=3.0
  
  # ── Variant Calling ────────────────────────────────────────────────────
  - bcftools>=1.17
  - freebayes>=1.3
  - gatk4>=4.4    # HaplotypeCaller + VariantFiltration (carrier-screening WES parity; variant_caller=gatk)
  
  # ── Coverage Analysis ──────────────────────────────────────────────────
  - mosdepth>=0.3
  
  # ── QC Aggregation ─────────────────────────────────────────────────────
  - multiqc>=1.14
  
  # ── Annotation ─────────────────────────────────────────────────────────
  - ensembl-vep=111
  
  # ── Python dependencies ────────────────────────────────────────────────
  - numpy
  - pandas
  - scipy
  - pysam
  - matplotlib
  - jinja2
  - pip:
    - python-pptx
    - pypdf
