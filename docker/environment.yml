name: single-gene-nipt
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # ── Core tools ─────────────────────────────────────────────────────────
  - python=3.12.3

  # ── Preprocessing ──────────────────────────────────────────────────────
  - fastp=1.1.0

  # ── Alignment ──────────────────────────────────────────────────────────
  - bwa=0.7.18
  - bwa-mem2=2.2.1
  - samtools=1.21
  - picard=3.4.0

  # ── Variant Calling ────────────────────────────────────────────────────
  - bcftools=1.21
  - freebayes=1.3.8
  - gatk4=4.6.2.0

  # ── Coverage Analysis ──────────────────────────────────────────────────
  - mosdepth=0.3.10

  # ── QC Aggregation ─────────────────────────────────────────────────────
  - multiqc=1.33

  # ── Annotation ─────────────────────────────────────────────────────────
  - ensembl-vep=111

  # ── Python dependencies ────────────────────────────────────────────────
  - numpy=2.4.3
  - pandas=3.0.1
  - scipy=1.17.1
  - pysam=0.22.1
  - matplotlib=3.10.8
  - jinja2=3.1.6
  - pip:
    - python-pptx==1.0.2
    - pypdf==6.9.2
